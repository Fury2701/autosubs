name: Build & Push

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  OWNER: fury2701

jobs:
  backend:
    name: Backend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/autosubs-backend:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/autosubs-backend:${{ github.sha }}

  frontend:
    name: Frontend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/autosubs-frontend:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/autosubs-frontend:${{ github.sha }}

  update-tags:
    name: Update image tags in values.yaml
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags
        run: |
          SHA="${{ github.sha }}"
          sed -i "s|tag: .*  # backend|tag: ${SHA}  # backend|" helm/autosubs/values.yaml
          sed -i "s|tag: .*  # frontend|tag: ${SHA}  # frontend|" helm/autosubs/values.yaml

      - name: Commit updated tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/autosubs/values.yaml
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ github.sha }}"
          git push
